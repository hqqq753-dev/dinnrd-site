<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Dinnrd</title>
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-body">

<div class="auth-card">
  <a href="/" class="auth-wordmark">Dinnr<span>d</span></a>
  <h1 class="auth-heading">Welcome back.</h1>
  <p class="auth-subline" style="margin-bottom:20px;"></p>

  <!-- Apple -->
  <button class="btn-oauth btn-apple" id="btn-apple" type="button">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
    </svg>
    Continue with Apple
  </button>

  <!-- Google -->
  <button class="btn-oauth btn-google" id="btn-google" type="button">
    <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider"><span>or</span></div>

  <div id="form-error" class="inline-error" style="display:none; margin-bottom:8px;"></div>

  <form id="login-form" novalidate>
    <div class="field-group">
      <label for="email" class="visually-hidden">Email address</label>
      <input type="email" id="email" class="input-field" placeholder="Email address"
             autocomplete="email" inputmode="email" required>
      <div class="field-error" id="email-error"></div>
    </div>
    <div class="field-group">
      <label for="password" class="visually-hidden">Password</label>
      <div class="input-pw-wrap">
        <input type="password" id="password" class="input-field" placeholder="Password"
               autocomplete="current-password" required>
        <button type="button" class="btn-show-pw" id="toggle-pw" aria-label="Show password">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="field-error" id="pw-error"></div>
    </div>
    <button type="submit" class="btn-primary" id="btn-submit">Sign in</button>
  </form>

  <p class="auth-link"><a href="/forgot-password">Forgot your password?</a></p>
  <p class="auth-link">Don't have an account? <a href="/signup">Sign up</a></p>
</div>

<script src="/js/config.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const { supabaseUrl, supabaseAnonKey, siteUrl } = window.DINNRD_CONFIG;
const supabase = createClient(supabaseUrl, supabaseAnonKey);

// If already signed in, redirect immediately
try {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const raw = new URLSearchParams(location.search).get('redirect') || '/account';
    const redir = raw.startsWith('/') && !raw.startsWith('//') ? raw : '/account';
    location.replace(redir);
  }
} catch (_) {}

// OAuth helpers
function oauthRedirectTo() {
  const redirect = new URLSearchParams(location.search).get('redirect') || '/account';
  return siteUrl + '/auth/callback?redirect=' + encodeURIComponent(redirect);
}

function oauthClick(provider) {
  const btnApple  = document.getElementById('btn-apple');
  const btnGoogle = document.getElementById('btn-google');
  btnApple.disabled  = true;
  btnGoogle.disabled = true;
  supabase.auth.signInWithOAuth({ provider, options: { redirectTo: oauthRedirectTo() } })
    .catch(() => { btnApple.disabled = false; btnGoogle.disabled = false; });
}

document.getElementById('btn-apple').addEventListener('click', () => oauthClick('apple'));
document.getElementById('btn-google').addEventListener('click', () => oauthClick('google'));

// Password toggle
const pwInput = document.getElementById('password');
document.getElementById('toggle-pw').addEventListener('click', () => {
  const show = pwInput.type === 'password';
  pwInput.type = show ? 'text' : 'password';
  document.getElementById('toggle-pw').setAttribute('aria-label', show ? 'Hide password' : 'Show password');
});

// Email/password sign in
const formError = document.getElementById('form-error');
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-submit');

  formError.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    formError.textContent = error.message.includes('Invalid login credentials')
      ? 'Incorrect email or password.' : error.message;
    formError.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign in';
    return;
  }

  const raw = new URLSearchParams(location.search).get('redirect') || '/account';
  const redir = raw.startsWith('/') && !raw.startsWith('//') ? raw : '/account';
  location.replace(redir);
});
</script>
</body>
</html>
